services:
  frontend-prod:
    build:
      context: .
      dockerfile: Dockerfile.prod
      args:
        # ⚠️ NEXT_PUBLIC_API_URL is baked into the JS bundle at build time.
        # Use a relative path so the browser sends requests to VM A's Nginx,
        # which then proxies /api to the backend VM.
        - NEXT_PUBLIC_API_URL=/api
        - NEXT_PUBLIC_SITE_URL=http://localhost:3000
    expose:
      - "3000"
    environment:
      - NODE_ENV=production
    env_file:
      - .env
    networks:
      - frontend-net
    restart: always

  nginx:
    image: nginx:latest
    container_name: ap-frontend-nginx
    ports:
      - "80:80"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      - frontend-prod
    networks:
      - frontend-net
    restart: always

networks:
  frontend-net:
    driver: bridge