version: "3.8"

services:
  mongodb-test:
    image: mongo:6.0
    ports:
      - "${TEST_MONGO_PORT:-27017}:27017"
    healthcheck:
      test: ["CMD-SHELL", "mongosh --eval 'db.runCommand({ping: 1})' --quiet || exit 1"]
      interval: 3s
      timeout: 3s
      retries: 10
      start_period: 3s
    networks:
      - test-net

  backend-test:
    build:
      context: ../ap-backend
      dockerfile: Dockerfile.prod
    environment:
      - NODE_ENV=test
      - MONGODB_URI=mongodb://mongodb-test:27017/andhra-potlam
      - PORT=8000
      - JWT_SECRET=test-secret-key-for-jwt-signing-minimum-32-characters
      - COOKIE_SECRET=test-cookie-secret
      - AWS_ACCESS_KEY_ID=mock-key
      - AWS_SECRET_ACCESS_KEY=mock-secret-key
      - AWS_BUCKET_NAME=mock-bucket
      - AWS_REGION=ap-south-1
      - SMTP_HOST=smtp.mailtrap.io
      - SMTP_PORT=2525
      - SMTP_USER=mock-user
      - SMTP_PASS=mock-pass
    depends_on:
      mongodb-test:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "wget --no-verbose --tries=1 --spider http://127.0.0.1:8000/api || exit 1"]
      interval: 3s
      timeout: 3s
      retries: 10
      start_period: 5s
    networks:
      - test-net

  frontend-test:
    build:
      context: .
      dockerfile: Dockerfile.prod
      args:
        - NEXT_PUBLIC_API_URL=/api
        - NEXT_PUBLIC_SITE_URL=http://localhost
    expose:
      - "3000"
    environment:
      - NODE_ENV=production
    depends_on:
      backend-test:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "wget --no-verbose --tries=1 --spider http://127.0.0.1:3000/auth/login || exit 1"]
      interval: 3s
      timeout: 3s
      retries: 10
      start_period: 5s
    networks:
      - test-net

  nginx-test:
    image: nginx:latest
    container_name: ap-frontend-nginx-test
    ports:
      - "${TEST_NGINX_PORT:-8080}:80"
    volumes:
      - ./nginx/nginx.test.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      backend-test:
        condition: service_healthy
      frontend-test:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost/health || exit 1"]
      interval: 3s
      timeout: 3s
      retries: 10
      start_period: 3s
    networks:
      - test-net

networks:
  test-net:
    driver: bridge
